# cspell:word amannn
---
jobs:
  semantic-pr:
    name: 'Semantic PR'
    runs-on: 'ubuntu-latest'
    steps:
    - env:
        GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
      # Assume success in a merge group by skipping the step, which
      # can't access a PR title inside a merge group.
      if: |
        github.event_name != 'merge_group'
      uses: 'amannn/action-semantic-pull-request@v6'
      with:
        requireScope: true
        scopes: '^ENG-[0-9]+$'
        subjectPattern: '^[A-Z].*$'
        validateSingleCommit: true
        validateSingleCommitMatchesPrTitle: true
name: 'Semantic PR'
'on':
  merge_group: null
  pull_request:
    types:
    - 'edited'
    - 'opened'
    - 'reopened'
    - 'synchronize'
permissions:
  pull-requests: 'read'
...
