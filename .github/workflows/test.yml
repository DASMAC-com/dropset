---
env:
  ANCHOR_REV: '304dda8c568ffffc01d02d87578dc062109eb257'
  SOLANA_VERSION: 'v3.1.9'
jobs:
  test:
    name: 'Tests'
    runs-on: 'ubuntu-latest'
    steps:
    - uses: 'actions/checkout@v6'
    - uses: 'dtolnay/rust-toolchain@stable'
    - uses: 'Swatinem/rust-cache@v2'
      with:
        cache-on-failure: true
        shared-key: 'rust-test-${{ runner.os }}'
    - uses: './.github/actions/install-toolchain'
      with:
        anchor-revision: '${{ env.ANCHOR_REV }}'
        solana-version: '${{ env.SOLANA_VERSION }}'
    - name: 'Run tests'
      run: 'make test'
name: 'Tests'
'on':
  pull_request: null
...
