---
# cspell:word doctests
# cspell:word dorny
# cspell:word nextest
# cspell:word taiki
env:
  ANCHOR_REV: '2a191379'
  SOLANA_VERSION: 'v3.1.9'
jobs:
  # Decide whether the changed files can affect the Rust test suite. On a
  # pull_request the filter below marks a PR `code`-relevant unless EVERY
  # touched file lands in a known test-irrelevant tree; a PR that touches only
  # the frontend, docs, or other irrelevant trees skips the build + test work
  # entirely. On merge_group and push-to-main the filter step is skipped and
  # `code` defaults to true, so the queue's final gate and the main branch
  # always run the full suite. The test jobs still RUN in every case
  # (only their expensive steps are gated), so the required "Tests" and "Tests
  # (no teardown)" checks always report success — a trigger-level `paths`
  # filter would instead leave them unreported and hang branch protection and
  # the merge queue forever.
  changes:
    name: 'Detect changes'
    outputs:
      code: '${{ steps.filter.outputs.code != ''false'' }}'
    permissions:
      contents: 'read'
      pull-requests: 'read'
    runs-on: 'ubuntu-latest'
    steps:
    # Fail-CLOSED deny-list. The `code` filter is a catch-all `'**'` minus a
    # negated list of known test-irrelevant trees, with predicate-quantifier
    # 'every': a changed file matches `code` only when it matches EVERY
    # predicate — i.e. it is some file (`'**'`) AND lands in none of the
    # excluded trees. paths-filter's output is existential (true if ANY changed
    # file matches), so `code` is true whenever at least one changed file is
    # test-RELEVANT, and false only when EVERY changed file is irrelevant — the
    # all-irrelevant PR that may skip. A new or renamed tree is, by default, not
    # on the exclude list, so it counts as relevant and RUNS the suite;
    # forgetting to exclude a genuinely-irrelevant tree only over-runs (safe),
    # never under-runs. Maintain the exclude list as irrelevant trees are
    # added/renamed. (A positive allow-list would instead fail OPEN — an
    # unlisted new test input would silently skip.)
    #
    # Fail-safe: a transient paths-filter/API error must not fail this job. If
    # it did, `needs: changes` would *skip* the test jobs (not run them with
    # steps gated), and a required check skipped via a failed `needs` reports as
    # pending — hanging branch protection, the very thing this design avoids. On
    # error — and on merge_group / push:main, where the step's `if` is false —
    # the step's `code` output is empty, so the job output defaults to true
    # (`'' != 'false'`) and the full suite runs.
    - continue-on-error: true
      id: 'filter'
      if: |
        github.event_name == 'pull_request'
      uses: 'dorny/paths-filter@v3'
      with:
        filters: |
          code:
          - '**'
          - '!frontend/**'
          - '!docs/**'
          - '!**/*.md'
          - '!sdk/ts/**'
          - '!sdk/codama/**'
          - '!.claude/**'
          - '!.github/workflows/lint.yml'
          - '!.github/workflows/sdk.yml'
          - '!.github/workflows/semantic-pr.yml'
          - '!pnpm-lock.yaml'
          - '!pnpm-workspace.yaml'
          - '!cfg/**'
        predicate-quantifier: 'every'
  test:
    name: 'Tests'
    needs: 'changes'
    runs-on: 'ubuntu-latest'
    steps:
    - uses: 'actions/checkout@v6'
    - if: |
        needs.changes.outputs.code == 'true'
      uses: 'dtolnay/rust-toolchain@stable'
    - if: |
        needs.changes.outputs.code == 'true'
      uses: './.github/actions/install-toolchain'
      with:
        anchor-revision: '${{ env.ANCHOR_REV }}'
        solana-version: '${{ env.SOLANA_VERSION }}'
    # rust-cache caches ~/.cargo/{registry,git} plus only the *dependency*
    # build artifacts in target/ (workspace crates are pruned), and re-saves
    # whenever the lockfile/toolchain change — so the cache never freezes at a
    # first-run snapshot and the restored target/ stays small. The shared-key
    # is intentionally the same as the no-teardown job's: their dependency
    # builds are identical across the two feature sets, so they share one
    # dep-artifact cache instead of each saving a full multi-GB target/.
    - if: |
        needs.changes.outputs.code == 'true'
      uses: 'Swatinem/rust-cache@v2'
      with:
        cache-on-failure: true
        shared-key: 'rust-test-${{ runner.os }}'
    # Cache the built program .so itself — rust-cache prunes workspace-crate
    # artifacts and never restores the SBF target, so without this the .so is
    # recompiled from scratch every run. The key is content-addressed over
    # every input that determines the binary (program + math-core sources, the
    # lockfile, the workspace/build config, and the pinned toolchain), so an
    # exact hit means the cached .so is valid and the build step below is
    # skipped; any program change misses and rebuilds. Restored after
    # rust-cache so it lands on top of the restored target/.
    - id: 'sbf-cache'
      if: |
        needs.changes.outputs.code == 'true'
      name: 'Cache program .so'
      uses: 'actions/cache@v5'
      with:
        key: 'sbf-default-${{ runner.os }}-${{ env.SOLANA_VERSION }}-${{
              env.ANCHOR_REV }}-${{ hashFiles(''programs/dropset/**'',
              ''sdk/math-core/**'', ''Cargo.lock'', ''Cargo.toml'',
              ''Anchor.toml'') }}'
        path: 'target/deploy/dropset.so'
    # target/deploy/ is git-ignored, so materialize the program keypair from
    # its canonical home (keys/AAAA.json) before the build and tests run.
    # This step is unconditional — on an SBF-cache hit the build step below
    # is skipped, but the litesvm tests still read this file, so it must be
    # present regardless. Replaces the old keypair-restore guard.
    - if: |
        needs.changes.outputs.code == 'true'
      name: 'Install program keypair'
      run: 'make program-keypair'
    # Build the program (.so) only on a cache miss — an exact SBF-cache hit
    # restored a valid binary above, so the expensive `cargo build-sbf` is
    # skipped. `make program` runs `anchor keys sync && anchor build`.
    - if: |
        needs.changes.outputs.code == 'true'
        && steps.sbf-cache.outputs.cache-hit != 'true'
      name: 'Build program (.so)'
      run: 'make program'
    # Install the nextest runner (downloaded binary, not compiled).
    - if: |
        needs.changes.outputs.code == 'true'
      uses: 'taiki-e/install-action@nextest'
    # Run the whole Rust workspace test suite — including the math-core
    # conformance vectors and the engine-vs-SDK litesvm conformance
    # (tests/sdk_conformance.rs). nextest runs tests from all ~20
    # integration binaries concurrently (process-per-test) instead of the
    # binary-at-a-time run of `cargo test`, the big win for a suite where
    # each test spins a fresh LiteSVM and redeploys the .so. (No doctests
    # are lost: every doc code fence is ```text.)
    - if: |
        needs.changes.outputs.code == 'true'
      name: 'Run tests'
      run: 'cargo nextest run'
    # IDL-diff gate (interface.md § SDK): the checked-in IDL must match
    # what the pinned anchor-cli regenerates from the program.
    - if: |
        needs.changes.outputs.code == 'true'
      name: 'Verify IDL is up to date'
      run: |
        make idl
        git diff --exit-code -- sdk/idl/dropset.json
  test-no-teardown:
    name: 'Tests (no teardown)'
    needs: 'changes'
    runs-on: 'ubuntu-latest'
    steps:
    - uses: 'actions/checkout@v6'
    - if: |
        needs.changes.outputs.code == 'true'
      uses: 'dtolnay/rust-toolchain@stable'
    - if: |
        needs.changes.outputs.code == 'true'
      uses: './.github/actions/install-toolchain'
      with:
        anchor-revision: '${{ env.ANCHOR_REV }}'
        solana-version: '${{ env.SOLANA_VERSION }}'
    # Shares the `test` job's dep-artifact cache via the same shared-key:
    # the dependency builds are identical across the two feature sets, so a
    # cold no-teardown run warms from that cache and only the dropset crate
    # is recompiled feature-off. rust-cache prunes the workspace crates from
    # target/ before saving, so restoring here no longer drags in the full
    # default-feature target/ that previously doubled the on-disk footprint
    # and crashed the runner with "No space left on device".
    - if: |
        needs.changes.outputs.code == 'true'
      uses: 'Swatinem/rust-cache@v2'
      with:
        cache-on-failure: true
        shared-key: 'rust-test-${{ runner.os }}'
    # Feature-off counterpart of the `test` job's SBF cache. Keyed with its
    # own `no-teardown` tag so the two jobs cache distinct binaries (the .so
    # built without `admin-teardown`) under the same path without clobbering
    # each other. Exact hit skips the build step below.
    - id: 'sbf-cache'
      if: |
        needs.changes.outputs.code == 'true'
      name: 'Cache program .so'
      uses: 'actions/cache@v5'
      with:
        key: 'sbf-no-teardown-${{ runner.os }}-${{ env.SOLANA_VERSION }}-${{
              env.ANCHOR_REV }}-${{ hashFiles(''programs/dropset/**'',
              ''sdk/math-core/**'', ''Cargo.lock'', ''Cargo.toml'',
              ''Anchor.toml'') }}'
        path: 'target/deploy/dropset.so'
    # target/deploy/ is git-ignored, so materialize the program keypair from
    # its canonical home (keys/AAAA.json) before the build and tests run.
    # This step is unconditional — on an SBF-cache hit the build step below
    # is skipped, but the litesvm tests still read this file, so it must be
    # present regardless. Replaces the old keypair-restore guard.
    - if: |
        needs.changes.outputs.code == 'true'
      name: 'Install program keypair'
      run: 'make program-keypair'
    # Build the feature-off .so only on a cache miss; an exact hit restored a
    # valid binary above. `make program-no-teardown` runs `anchor build --
    # --no-default-features`.
    - if: |
        needs.changes.outputs.code == 'true'
        && steps.sbf-cache.outputs.cache-hit != 'true'
      name: 'Build program (.so, no teardown)'
      run: 'make program-no-teardown'
    # Install the nextest runner (downloaded binary, not compiled).
    - if: |
        needs.changes.outputs.code == 'true'
      uses: 'taiki-e/install-action@nextest'
    - if: |
        needs.changes.outputs.code == 'true'
      name: 'Run feature-off teardown-disabled tests'
      run: 'cargo nextest run --no-default-features --test teardown_disabled'
name: 'Tests'
'on':
  merge_group: null
  pull_request: null
  push:
    branches:
    - 'main'
...
