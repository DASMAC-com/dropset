---
env:
  NODE_VERSION: '25'
jobs:
  sdk:
    name: 'SDK'
    runs-on: 'ubuntu-latest'
    steps:
    - uses: 'actions/checkout@v6'
    - uses: 'dtolnay/rust-toolchain@stable'
      with:
        targets: 'wasm32-unknown-unknown'
    - uses: 'Swatinem/rust-cache@v2'
      with:
        cache-on-failure: true
        shared-key: 'rust-sdk-${{ runner.os }}'
    - uses: 'pnpm/action-setup@v6'
      with:
        package_json_file: 'frontend/package.json'
    - uses: 'actions/setup-node@v6'
      with:
        cache: 'pnpm'
        cache-dependency-path: 'pnpm-lock.yaml'
        node-version: '${{ env.NODE_VERSION }}'
    - run: 'pnpm install --frozen-lockfile'
    # The generated TS + Rust clients must match a fresh codegen from the
    # checked-in IDL — no manual edits, no drift (cf. the CPI-bindings
    # check on dropset-beta). Regenerate, then stage + diff so additions
    # and deletions fail the gate too, not just in-place modifications.
    - name: 'Generated clients match the IDL'
      run: |
        make sdk
        git add -A -- sdk/ts/src/generated sdk/rs/src/generated
        git diff --cached --exit-code -- \
        sdk/ts/src/generated sdk/rs/src/generated
    # The checked-in conformance vectors are generated artifacts that only
    # get *consumed* by the tests below — nothing re-derives them.
    # Regenerate from the math-core examples and fail on drift, so a
    # hand-edited vector or an un-regenerated generator / `Price` change
    # can't pin stale expectations while CI stays green.
    - name: 'Conformance vectors are fresh'
      run: 'make check-conformance-vectors'
    # TypeScript SDK: typecheck + cross-language conformance vectors, then
    # the publish build. The build emits dist/ only for the published npm
    # package (the workspace consumes raw TS), so nothing else exercises it
    # — run it here so a broken tsup/exports/dts config fails the gate.
    - run: 'pnpm --filter @dropset/sdk run check'
    - run: 'pnpm --filter @dropset/sdk test'
    - run: 'pnpm --filter @dropset/sdk run build'
    # Off-chain Rust crates (no program .so needed): unit tests + the
    # math-core conformance vectors, plus the WASM target build over
    # `dropset-interface` (its `wasm` feature pulls in math-core's).
    - run: 'cargo test -p dropset-math-core -p dropset-interface -p dropset-sdk'
    - run: 'cargo build -p dropset-interface --features wasm --target
            wasm32-unknown-unknown'
    # Execute the WASM `simulate_swap` binding the TS client calls (the step
    # above only *builds* it). `wasm-pack test --node` runs the binding
    # through its generated JS glue against the checked-in
    # simulate_swap_vectors.json, pinning it to the engine-conformant native
    # matcher — the decode + side dispatch + Quote marshalling no host test
    # can reach.
    - uses: 'taiki-e/install-action@v2'
      with:
        tool: 'wasm-pack'
    - run: 'wasm-pack test --node sdk/interface --test wasm_conformance
            --features wasm'
name: 'SDK'
'on':
  merge_group: null
  pull_request: null
  push:
    branches:
    - 'main'
...
