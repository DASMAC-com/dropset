# Localnet market-maker bot for the CADC/USDC mock market. A single leader
# bot that quotes CADC against USDC on the eCLOB per docs/market-making-mvp.md:
# poll external price feeds, compose a fair mid, and drive the relative-quoting
# hot path (set_reference_price) and cold path (set_liquidity_profile) with an
# inventory skew and kill-switch policy. Rust-only, not published. No tokio:
# a synchronous tick loop drives blocking feed polls (ureq) and the blocking
# RpcClient (sdk/rs `fetch` feature), matching the TUI and stage-backlog.

[[bin]]
name = "dropset-maker-bot"
path = "src/main.rs"

[dependencies]
# The fill-event subscription decodes `emit_cpi!` inner instructions, which
# anchor frames with its `EVENT_IX_TAG_LE` self-CPI tag ‚Äî sourced here rather
# than hand-copied. Default features only ‚Äî host build, no on-chain
# (`const-rent` / `testing`) extras.
anchor-lang-v2 = { workspace = true }
anyhow = "1"
# Decode the borsh wire form of `FillEvent` off the event inner instruction.
borsh = "1"
# Inner-instruction `data` comes back base58-encoded from `getTransaction`
# even under base64 transaction encoding, so decode it before parsing.
bs58 = "0.5"
# Zero the `LiquidityProfile` Pod before filling its levels, and read the
# on-chain `Vault` slab mirror for live inventory (matches the SDK's own
# profile construction and the TUI's account decoding).
bytemuck = "1"
# The off-chain client: Codama instruction builders + the `quoting` helpers
# (set_reference_price_ix / set_liquidity_profile_ix / NativeBook), the typed
# `fetch_*` account decoders, the `layout` slab mirror (active-vault walk for
# inventory), the `Price` codec, and the blocking `RpcClient` ‚Äî all behind
# `fetch`.
dropset-sdk = { path = "../../sdk/rs", features = ["fetch"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Reproduce `FillEvent`'s event discriminator off-chain via anchor's
# name-based scheme, `sha256("event:FillEvent")[..8]` ‚Äî the on-chain type
# lives in the SBF-only program crate the bot can't depend on.
sha2 = "0.10"
# Pinned to the SDK's 3.x line (sdk/rs/Cargo.toml) so there is one
# `Pubkey` / `Instruction` / `RpcClient` type across the builder, fetch, and
# transaction paths ‚Äî NOT the workspace's solana-pubkey 4.x. `~3.1` on
# solana-client matches the validator minor the Makefile gates (3.1.x).
solana-client = "~3.1"
solana-commitment-config = "3"
solana-instruction = "3"
solana-keypair = "3"
solana-pubkey = "3"
# Parse the `getTransaction` signature from the logs-subscription notification.
solana-signature = "3"
solana-signer = "3"
solana-transaction = "3"
# Name the `getTransaction` response shapes (`EncodedConfirmedTransaction‚Ä¶`,
# `UiInstruction`, the inner-instruction list) the fill decoder walks. The
# light client-types crate, not the full `solana-transaction-status`.
solana-transaction-status-client-types = "3"
# Blocking HTTP for the price feeds (CoinGecko / Oanda / GeckoTerminal), the
# same synchronous JSON client tools/stage-backlog uses for Linear.
ureq = { version = "2", features = ["json"] }

[package]
description = "Localnet market-maker bot for the Dropset CADC/USDC mock market."
name = "dropset-maker-bot"
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
version.workspace = true
