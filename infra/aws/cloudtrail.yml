---
AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Dropset AWS audit baseline: a multi-region CloudTrail trail with log-file
  validation, writing to a private, encrypted S3 bucket. This records the
  API activity behind agent-driven provisioning (the aws:CalledViaAWSMCP /
  aws:ViaAWSMCPService context keys are captured on each event).
Outputs:
  TrailBucketName:
    Description: 'Name of the S3 bucket holding CloudTrail logs.'
    Export:
      Name: !Sub '${EnvironmentName}-cloudtrail-bucket'
    Value: !Ref 'TrailBucket'
  TrailName:
    Description: 'Name of the CloudTrail trail.'
    Export:
      Name: !Sub '${EnvironmentName}-cloudtrail-name'
    Value: !Ref 'Trail'
Parameters:
  EnvironmentName:
    Default: 'dropset-dev'
    Description: 'Name prefix applied to the trail, bucket, and exports.'
    Type: 'String'
  LogRetentionDays:
    Default: 365
    Description: 'Days to retain CloudTrail log objects before expiry.'
    Type: 'Number'
Resources:
  Trail:
    DependsOn: 'TrailBucketPolicy'
    Properties:
      EnableLogFileValidation: true
      IncludeGlobalServiceEvents: true
      IsLogging: true
      IsMultiRegionTrail: true
      S3BucketName: !Ref 'TrailBucket'
      Tags:
      - Key: 'Name'
        Value: !Sub '${EnvironmentName}-cloudtrail'
      TrailName: !Sub '${EnvironmentName}-cloudtrail'
    Type: 'AWS::CloudTrail::Trail'
  TrailBucket:
    DeletionPolicy: 'Retain'
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
        - ServerSideEncryptionByDefault:
            SSEAlgorithm: 'AES256'
      BucketName: !Sub '${EnvironmentName}-cloudtrail-${AWS::AccountId}'
      LifecycleConfiguration:
        Rules:
        - ExpirationInDays: !Ref 'LogRetentionDays'
          Id: 'expire-old-logs'
          Status: 'Enabled'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
      - Key: 'Name'
        Value: !Sub '${EnvironmentName}-cloudtrail'
    Type: 'AWS::S3::Bucket'
    UpdateReplacePolicy: 'Retain'
  TrailBucketPolicy:
    Properties:
      Bucket: !Ref 'TrailBucket'
      PolicyDocument:
        Statement:
        - Action: 's3:GetBucketAcl'
          Condition:
            StringEquals:
              'aws:SourceArn': !Sub >-
                arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${EnvironmentName}-cloudtrail
          Effect: 'Allow'
          Principal:
            Service: 'cloudtrail.amazonaws.com'
          Resource: !GetAtt 'TrailBucket.Arn'
          Sid: 'AWSCloudTrailAclCheck'
        - Action: 's3:PutObject'
          Condition:
            StringEquals:
              'aws:SourceArn': !Sub >-
                arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${EnvironmentName}-cloudtrail
              's3:x-amz-acl': 'bucket-owner-full-control'
          Effect: 'Allow'
          Principal:
            Service: 'cloudtrail.amazonaws.com'
          Resource: !Sub >-
            arn:aws:s3:::${TrailBucket}/AWSLogs/${AWS::AccountId}/*
          Sid: 'AWSCloudTrailWrite'
        Version: '2012-10-17'
    Type: 'AWS::S3::BucketPolicy'
...
