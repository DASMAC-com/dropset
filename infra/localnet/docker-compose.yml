---
# cspell:word healthcheck
# cspell:word isready
# Localnet Docker stack.
#
# Seed service: the Solana Explorer, served on http://localhost:3100 so a
# loopback page reaches the loopback validator RPC without the
# public-site -> localhost block that stalls the hosted explorer. Host port
# 3100 (not 3000) leaves localhost:3000 to the frontend's `next dev`, so the
# explorer and the frontend can run at the same time.
#
# The indexer stack (postgres + indexer + indexer-api) joins this same stack
# (docs/indexer.md §8): the worker polls the host validator for events and
# the api serves /v1 on http://localhost:8080. Bring it up with
# `make indexer-up`.
#
# The maker + taker bots join too (`make bots-up`): both sign with the repo
# `keys/` keypairs bind-mounted in, reach the host-run validator at
# host.docker.internal:8899, and refuse any non-localnet genesis. The host
# validator is intentionally not a service here — the dropset-tui control
# plane owns its lifecycle. Future localnet services join this stack too.
#
# The dropset-tui control plane owns this stack's lifecycle: it brings the
# explorer up in the background at launch and tears it down on quit.
# `make explorer` / `make explorer-down` drive it by hand.
name: 'dropset-localnet'
services:
  explorer:
    # `.github/workflows/explorer-image.yml` builds this image (multi-arch) and
    # pushes it to the `image:` tag below; `pull` / `up` prefer that prebuilt
    # image so a cold localnet doesn't pay the from-source build. This `build:`
    # is the fallback compose uses when the tag can't be pulled (offline, or a
    # freshly-bumped version CI hasn't published yet). The explorer source ref
    # is pinned in explorer.Dockerfile (`ARG EXPLORER_REF`); bump it and the
    # `image:` tag together to cut a new version.
    build:
      context: '.'
      dockerfile: 'explorer.Dockerfile'
    # The explorer reads localnet state client-side (the browser hits the
    # customUrl RPC directly); the host gateway lets any server-side fetch
    # reach a host-run validator at http://host.docker.internal:8899.
    extra_hosts:
    - 'host.docker.internal:host-gateway'
    # The CI-published image localnet pulls. Bump this tag (with EXPLORER_REF
    # in explorer.Dockerfile) in one commit to cut a new version; the workflow
    # publishes it and localnet pulls it instead of building from source.
    image: 'dasmac/dropset-localnet-explorer:v1'
    # Bind to loopback only — a local dev viewer, not a LAN service. Host port
    # 3100 dodges the frontend's localhost:3000; the container serves 3000.
    ports:
    - '127.0.0.1:3100:3000'
    # Prefer a locally-cached image, else pull the tag above; the `build:`
    # falls in only when that pull is unavailable.
    pull_policy: 'missing'
    restart: 'unless-stopped'
  indexer:
    # Decode + persist + aggregate. Polls the host-run validator's events.
    build:
      context: '../..'
      dockerfile: 'infra/localnet/indexer.Dockerfile'
    command:
    - 'dropset-indexer'
    depends_on:
      postgres:
        condition: 'service_healthy'
    environment:
      DATABASE_URL: 'postgres://dropset:dropset@postgres:5432/dropset_indexer'
      RPC_URL: 'http://host.docker.internal:8899'
      RUST_LOG: 'info'
    extra_hosts:
    - 'host.docker.internal:host-gateway'
    restart: 'unless-stopped'
  indexer-api:
    # The /v1 REST surface, on loopback http://localhost:8080.
    build:
      context: '../..'
      dockerfile: 'infra/localnet/indexer.Dockerfile'
    command:
    - 'dropset-indexer-api'
    depends_on:
      postgres:
        condition: 'service_healthy'
    environment:
      API_BIND: '0.0.0.0:8080'
      DATABASE_URL: 'postgres://dropset:dropset@postgres:5432/dropset_indexer'
      RUST_LOG: 'info'
    ports:
    - '127.0.0.1:8080:8080'
    restart: 'unless-stopped'
  maker-bot:
    # The leader market-maker: polls feeds, composes a fair mid, and drives
    # the relative-quoting hot + cold paths. Funds its leader (keys/EEEE.json)
    # from the localnet faucet over RPC, so it needs no host wallet — only the
    # repo keys/ mount. CMC_API_KEY (host env, optional) arms the CoinMarketCap
    # secondary tier; without it the feed cascades CoinGecko → FX-rate → static.
    build:
      context: '../..'
      dockerfile: 'infra/localnet/bots.Dockerfile'
    command:
    - 'dropset-maker-bot'
    - '--rpc'
    - 'http://host.docker.internal:8899'
    environment:
      CMC_API_KEY: '${CMC_API_KEY:-}'
      RUST_LOG: 'info'
    extra_hosts:
    - 'host.docker.internal:host-gateway'
    restart: 'unless-stopped'
    volumes:
    - '../../keys:/app/keys:ro'
  postgres:
    # Prototype: data is ephemeral (no named volume) — the indexer re-syncs
    # from chain via its watermark, so a fresh container just re-indexes.
    environment:
      POSTGRES_DB: 'dropset_indexer'
      POSTGRES_PASSWORD: 'dropset'
      POSTGRES_USER: 'dropset'
    healthcheck:
      interval: '5s'
      retries: 10
      test:
      - 'CMD-SHELL'
      - 'pg_isready -U dropset -d dropset_indexer'
    image: 'postgres:16-alpine'
    ports:
    - '127.0.0.1:5432:5432'
    restart: 'unless-stopped'
  taker-bot:
    # The benign flow taker: stochastic swaps so the book moves and the maker
    # takes fills. Signs swaps with keys/FFFF.json and mints itself back up to
    # target inventory under the mock-mint authority (keys/BBBB.json, the same
    # committed admin key the host TUI created the mints under) — so, like the
    # maker, it needs only the repo keys/ mount and no host wallet.
    #
    # Opt-in, off by default: the `taker` profile keeps it out of a plain
    # `docker compose up` (and `make bots-up`), so the seeded market stays quiet
    # until the operator explicitly starts it with `make taker-up`. Real takes
    # are operator-driven; this only exists to make localnet books look alive.
    build:
      context: '../..'
      dockerfile: 'infra/localnet/bots.Dockerfile'
    command:
    - 'dropset-taker-bot'
    - '--rpc'
    - 'http://host.docker.internal:8899'
    environment:
      RUST_LOG: 'info'
    extra_hosts:
    - 'host.docker.internal:host-gateway'
    profiles:
    - 'taker'
    restart: 'unless-stopped'
    volumes:
    - '../../keys:/app/keys:ro'
...
