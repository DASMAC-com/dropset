# sqlfluff config for the externalized indexer SQL (indexer/queries/*.sql).
# Postgres dialect to match the indexer's store; the queries carry `$1`-style
# numbered bind parameters, so the placeholder templater renders them before
# parsing. 80-column cap mirrors the repo-wide line-length convention.
[sqlfluff]
dialect = postgres
templater = placeholder
max_line_length = 80
# `SELECT *` is deliberate: the reads map onto `FromRow` structs by column
# name, so the star tracks the table rather than pinning a column list that
# would silently drift from the schema. Drop the "unknown column count" rule.
exclude_rules = AM04

[sqlfluff:templater:placeholder]
param_style = numeric_dollar
