# cspell:word checkmake
# cspell:word hadolint
# cspell:word mdformat
# cspell:word pygrep
---
repos:
- hooks:
  - args:
    - '--config-file'
    - 'cfg/yamllint.yml'
    - '--strict'
    id: 'yamllint'
  repo: 'https://github.com/adrienverge/yamllint'
  rev: 'v1.38.0'
- hooks:
  - args:
    - '--config'
    - 'cfg/markdownlint.yml'
    files: '.(md|mdc)'
    id: 'markdownlint-fix'
    types:
    - 'file'
  repo: 'https://github.com/igorshubovych/markdownlint-cli'
  rev: 'v0.48.0'
- hooks:
  - additional_dependencies:
    - 'mdformat-gfm'
    - 'mdformat-frontmatter'
    - 'mdformat-myst'
    files: '.(md|mdc)'
    id: 'mdformat'
    types:
    - 'file'
  repo: 'https://github.com/hukkin/mdformat'
  rev: '1.0.0'
- hooks:
  - args:
    - '--config'
    - 'cfg/cspell.yml'
    - '--color'
    - '--no-must-find-files'
    id: 'cspell'
  repo: 'https://github.com/streetsidesoftware/cspell-cli'
  rev: 'v10.0.0'
- hooks:
  - id: 'check-added-large-files'
  - id: 'check-case-conflict'
  - id: 'detect-private-key'
  # .rs files are handled by rustfmt. The generated TS tree + the anchor
  # IDL are autogenerated (no trailing newline) and verified by the SDK CI
  # gate, so don't let the fixer fight regeneration.
  - exclude: '(.*.rs|^sdk/ts/src/generated/|^sdk/idl/)'
    id: 'end-of-file-fixer'
  - files: 'cfg/dictionary.txt'
    id: 'file-contents-sorter'
  - id: 'mixed-line-ending'
  # JSON under frontend/ is handled by biome.
  # `sdk/idl/` is the anchor-generated IDL and `sdk/conformance/` are the
  # generator-emitted conformance vectors — leave both byte-for-byte as
  # their generators emit them so the diff-based freshness CI gates
  # (`make idl`, `make check-conformance-vectors`) stay meaningful.
  # `keys/` holds Solana CLI keypair files — keep them in their
  # canonical single-line byte-array form, not pretty-printed.
  - args:
    - '--autofix'
    exclude: '^(frontend|keys|sdk/(idl|conformance))/|package-lock\.json'
    id: 'pretty-format-json'
  repo: 'https://github.com/pre-commit/pre-commit-hooks'
  rev: 'v6.0.0'
- hooks:
  - id: 'checkmake'
  repo: 'https://github.com/checkmake/checkmake.git'
  rev: 'v0.3.2'
# checkmake lints Makefile structure and hadolint lints Dockerfile structure,
# but neither checks line width. This local pygrep hook enforces the same
# 80-column limit the docs follow (MD013) across both, failing on any line over
# 80 chars (a leading recipe tab counts as one column). Wrap with `\`
# continuations, as the existing multi-line recipes and Dockerfile `COPY`s do.
- hooks:
  - entry: '^.{81,}$'
    files: '(^|/)(Makefile|.*\.mk|Dockerfile|.*\.Dockerfile)$'
    id: 'line-length-80'
    language: 'pygrep'
    name: 'Lines over 80 columns'
  repo: 'local'
# hadolint-py wraps the hadolint binary so the hook needs neither Docker nor
# a manual install. `files` matches `Dockerfile` and `*.Dockerfile` (identify
# doesn't tag the latter as the `dockerfile` type), so `types: file`.
- hooks:
  - files: 'Dockerfile$'
    id: 'hadolint'
    types:
    - 'file'
  repo: 'https://github.com/AleksaC/hadolint-py'
  rev: 'v2.14.0'
# taplo formats every `.toml` to the shared 80-column limit, auto-wrapping
# over-width inline arrays (config in cfg/taplo.toml). The hook pip-installs a
# prebuilt taplo, so it needs neither a Rust build nor Docker. `Cargo.lock` is
# tagged `toml` by identify but is cargo-managed, so leave it untouched.
- hooks:
  - args:
    - '--config'
    - 'cfg/taplo.toml'
    exclude: 'Cargo.lock'
    id: 'taplo'
  repo: 'https://github.com/hoxbro/taplo-pre-commit'
  rev: 'v0.9.3'
- hooks:
  - args:
    - '--fix'
    id: 'ruff-check'
  - id: 'ruff-format'
  repo: 'https://github.com/astral-sh/ruff-pre-commit'
  rev: 'v0.15.18'
# Lint the externalized indexer SQL (indexer/queries/*.sql, loaded by
# store.rs via include_str!). Postgres dialect + `$n` placeholder templater
# are set in cfg/sqlfluff.cfg.
- hooks:
  - args:
    - '--config'
    - 'cfg/sqlfluff.cfg'
    files: '^indexer/queries/.*\.sql$'
    id: 'sqlfluff-lint'
  repo: 'https://github.com/sqlfluff/sqlfluff'
  rev: '4.2.2'
# shfmt formats and shellcheck lints the committed shell-integration scripts
# under `.claude/scripts/`. Both hooks pip-install a prebuilt binary, so neither
# needs Go nor Docker (matching the taplo / hadolint-py pattern). They are
# scoped to `.claude/scripts/` so the POSIX-sh scripts under `.github/` are left
# byte-for-byte as they are. These are user shell-integration scripts, not skill
# helpers, so bash + shfmt is the deliberate call here (skill helpers stay
# Python per docs/conventions/skill-tooling.md).
- hooks:
  - args:
    - '-w'
    - '-i'
    - '2'
    - '-ci'
    files: '^\.claude/scripts/.*\.sh$'
    id: 'shfmt'
  repo: 'https://github.com/maxwinterstein/shfmt-py'
  rev: 'v3.7.0.1'
- hooks:
  - files: '^\.claude/scripts/.*\.sh$'
    id: 'shellcheck'
  repo: 'https://github.com/shellcheck-py/shellcheck-py'
  rev: 'v0.10.0.1'
- hooks:
  - entry: 'cargo fmt --'
    id: 'rustfmt'
    language: 'system'
    name: 'rustfmt'
    types:
    - 'rust'
  - entry: 'cargo clippy --all-targets -- -D warnings'
    id: 'clippy'
    language: 'system'
    name: 'clippy'
    pass_filenames: false
    types:
    - 'rust'
  - entry: 'pnpm -C frontend exec biome check --write'
    id: 'biome'
    language: 'system'
    name: 'biome'
    pass_filenames: false
    types_or:
    - 'css'
    - 'javascript'
    - 'jsx'
    - 'ts'
    - 'tsx'
  - entry: 'pnpm -C frontend exec tsc --noEmit'
    id: 'tsc'
    language: 'system'
    name: 'tsc'
    pass_filenames: false
    types_or:
    - 'ts'
    - 'tsx'
  repo: 'local'
...
